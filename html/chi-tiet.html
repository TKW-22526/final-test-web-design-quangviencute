<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Sản Phẩm - SHK SHOP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/chi-tiet.css" />
    <style></style>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo-container">
          <img src="../assets/logo.jpg" alt="Logo" class="logo-img" />
          <div class="logo-text">
            <a href="../index.html">SHK<span>.SHOP</span></a>
          </div>
        </div>
        <ul class="nav-links">
          <li><a href="../index.html">Trang Chủ</a></li>
          <li><a href="danh-muc.html">Danh Mục</a></li>
          <li><a href="san-pham.html" class="active">Sản Phẩm</a></li>
          <li><a href="gioi-thieu.html">Giới Thiệu</a></li>
          <li><a href="lien-he.html">Liên Hệ</a></li>
          <li><a href="dang-nhap.html" id="navAuth">Đăng Nhập</a></li>
        </ul>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Tìm..." />
        </div>
      </nav>
    </header>

    <!-- Khung chính chứa toàn bộ thông tin chi tiết -->
    <main class="main-container detail-container" id="main-container">
      <!-- BÊN TRÁI: HÌNH ẢNH MÔ HÌNH DỰA THEO ID -->
      <div class="gallery-container">
        <img src="" id="mainDisplayImage" class="main-img" />
        <div class="thumb-nails">
          <img src="" id="thumb1" class="active" onclick="changeImage(this)" />
          <img src="" id="thumb2" onclick="changeImage(this)" />
        </div>
      </div>

      <!-- BÊN PHẢI: CHỮ NGHĨA TỰ ĐỘNG THAY ĐỔI THEO ID -->
      <div>
        <p class="info-series" id="series">Series:</p>
        <h1 class="info-title" id="name"></h1>
        <p class="info-price" id="price"></p>

        <!-- Đoạn mô tả sản phẩm lấy từ file JS -->
        <p class="info-description" id="description"></p>

        <!-- Khung thông số kỹ thuật tự động nhận diện thẻ <b> và <br> -->
        <div class="spec-box">
          <h5>Thông số kỹ thuật:</h5>
          <div id="details" class="spec-content"></div>
        </div>

        <button class="cta-btn">Đặt Hàng Trước (Pre-Order)</button>
      </div>
    </main>

    <footer>
      <p>
        &copy; 2026 <span>SHK.SHOP</span>. Assignment Thiết kế Web giới thiệu Mô
        hình.
      </p>
    </footer>

    <!-- ĐƯỜNG DẪN KẾT NỐI FILE CHỨA MẢNG SẢN PHẨM (Bảo đảm đúng tên file js của bạn) -->
    <script src="../js/script.js"></script>

    <script>
      // 1. Đọc mã ID từ thanh địa chỉ URL (?id=10)
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id");

      // 2. Tìm sản phẩm trong mảng bằng cách ép kiểu String để tránh lỗi Số vs Chữ
      const foundProduct = products.find(
        (obj) => String(obj.id) === String(productId),
      );

      // 3. Nếu tìm thấy sản phẩm, tiến hành thay thế ruột HTML bằng dữ liệu động
      if (foundProduct) {
        document.getElementById("name").innerText = foundProduct.name;
        document.getElementById("price").innerText = foundProduct.price;
        document.getElementById("series").innerText =
          "Series: " + (foundProduct.series || "Đang cập nhật");
        document.getElementById("description").innerText =
          foundProduct.description ||
          "Chưa có mô tả chi tiết cho sản phẩm này.";

        // Cập nhật đường dẫn ảnh cho ảnh chính và cả các thumbnail
        document.getElementById("mainDisplayImage").src = foundProduct.image;
        document.getElementById("mainDisplayImage").alt = foundProduct.name;
        document.getElementById("thumb1").src = foundProduct.image;
        document.getElementById("thumb2").src = foundProduct.image;

        // Đổ dữ liệu chi tiết, cho phép đọc thẻ <b> và <br>
        if (foundProduct.details) {
          document.getElementById("details").innerHTML = foundProduct.details;
        } else {
          document.getElementById("details").innerText =
            "Đang cập nhật thông số...";
        }

        // Đổi luôn tiêu đề trên tab trình duyệt cho chuyên nghiệp
        document.title = foundProduct.name + " - Crimson GSC";
      } else {
        // Nếu bấm bậy bạ ra ID không tồn tại, hiện thông báo lỗi ngay tại khung chính
        document.getElementById("main-container").innerHTML = `
              <div style="grid-column: span 2; text-align: center; padding: 100px 20px; color: var(--primary-color);">
                  <h2 style="font-weight: 800; font-size: 28px;">SẢN PHẨM KHÔNG TỒN TẠI HOẶC ĐÃ BỊ XÓA!</h2>
                  <p style="color: var(--text-muted); margin: 20px 0 30px 0;">Vui lòng quay lại danh sách để chọn mô hình khác.</p>
                  <a href="san-pham.html" class="cta-btn" style="text-decoration: none; display: inline-block;">Quay lại trang sản phẩm</a>
              </div>`;
      }

      // Hàm xử lý khi người dùng click vào ảnh nhỏ thumbnail
      function changeImage(element) {
        document.getElementById("mainDisplayImage").src = element.src;
        document
          .querySelectorAll(".thumb-nails img")
          .forEach((img) => img.classList.remove("active"));
        element.classList.add("active");
      }
    </script>
    <script src="../js/script.js"></script>
  </body>
</html>
