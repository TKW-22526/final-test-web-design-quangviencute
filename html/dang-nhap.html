<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - SHK SHOP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dang-nhap.css" />
    <style></style>
  </head>
  <body>
    <div class="auth-container">
      <h2>Đăng <span>Nhập</span></h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input
            type="text"
            id="loginUser"
            placeholder="Nhập tài khoản..."
            required
          />
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input
            type="password"
            id="loginPass"
            placeholder="Nhập mật khẩu..."
            required
          />
        </div>
        <button type="submit" class="auth-btn">Vào Hệ Thống</button>
      </form>

      <a href="../index.html" class="back-btn">← Quay Lại Shop</a>

      <div class="auth-redirect">
        Chưa có tài khoản? <a href="dang-ky.html">Đăng ký tại đây</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = document.getElementById("loginUser").value.trim();
          const pass = document.getElementById("loginPass").value;

          // 1. Lấy dữ liệu đã đăng ký trong máy ra để đối chiếu
          const savedData = localStorage.getItem("user_" + user);

          let registeredPassword = "";
          let userDisplayName = user; // Mặc định lấy tên account làm tên hiển thị
          let userEmail = user + "@gmail.com"; // Tự chế email ảo nếu trang đăng ký không có

          // 2. Bộ phân tích dữ liệu thông minh
          if (savedData) {
            try {
              // Phòng trường hợp trang dang-ky.html của bồ lưu dạng OBJECT JSON (Có đầy đủ tên, email, pass)
              const parsed = JSON.parse(savedData);
              if (parsed && parsed.password) {
                registeredPassword = parsed.password;
                userDisplayName = parsed.name || user;
                userEmail = parsed.email || user + "@gmail.com";
              } else {
                registeredPassword = savedData;
              }
            } catch (error) {
              // Nếu trang dang-ky.html của bồ chỉ lưu chuỗi MẬT KHẨU thuần túy
              registeredPassword = savedData;
            }
          }

          // 3. Kiểm tra mật khẩu bồ nhập vào có khớp không
          if (registeredPassword && registeredPassword === pass) {
            alert("Đăng nhập thành công! Chào mừng quay trở lại shop. 🎉");

            // 🔑 BƯỚC QUAN TRỌNG: Đóng gói thành Object để đồng bộ với Trang Cá Nhân
            const currentUserObj = {
              name: userDisplayName,
              email: userEmail,
            };
            localStorage.setItem("currentUser", JSON.stringify(currentUserObj));

            // ĐIỀU HƯỚNG THÔNG MINH:
            // Thay vì về index.html, mình đẩy thẳng sang trang cá nhân để xem thông tin/đơn hàng cho đúng chuẩn Shopee nha!
            window.location.href = "trang-ca-nhan.html";
          } else {
            alert("Sai tên đăng nhập hoặc mật khẩu! Vui lòng kiểm tra lại. ❌");
          }
        });
    </script>
  </body>
</html>
