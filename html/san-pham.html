<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sản Phẩm - SHK</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/san-pham.css" />
    <style></style>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo-container">
          <img src="../assets/logo.jpg" alt="Logo" class="logo-img" />
          <div class="logo-text">
            <a href="../index.html">SHK<span>.SHOP</span></a>
          </div>
        </div>
        <ul class="nav-links">
          <li><a href="../index.html">Trang Chủ</a></li>
          <li><a href="danh-muc.html">Danh Mục</a></li>
          <li><a href="san-pham.html" class="active">Sản Phẩm</a></li>
          <li><a href="gioi-thieu.html">Giới Thiệu</a></li>
          <li><a href="lien-he.html">Liên Hệ</a></li>
          <li><a href="dang-nhap.html" id="navAuth">Đăng Nhập</a></li>
        </ul>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Tìm mô hình..." />
        </div>
      </nav>
    </header>

    <div class="main-container product-page-layout">
      <!-- BỘ LỌC BÊN TRÁI -->
      <aside class="sidebar-filter">
        <div class="filter-group">
          <h3>Dòng Mô Hình</h3>
          <div class="filter-options">
            <!-- Đã đổi value chuẩn có dấu gạch để khớp 100% với link bên danh mục -->
            <label
              ><input type="checkbox" name="type" value="strangerthing" />
              STRANGER THINGS</label
            >
            <label
              ><input type="checkbox" name="type" value="marvel" />
              MARVEL</label
            >
            <label
              ><input type="checkbox" name="type" value="naruto" />
              NARUTO</label
            >
            <label
              ><input type="checkbox" name="type" value="one-piece" /> ONE
              PIECE</label
            >
            <label
              ><input type="checkbox" name="type" value="frieren" />
              FRIEREN</label
            >
            <label
              ><input type="checkbox" name="type" value="ghibli" /> GHIBLI
              STUDIO</label
            >
            <label
              ><input type="checkbox" name="type" value="shangrila" />
              SHANGRI-LA FRONTIER</label
            >
            <label
              ><input type="checkbox" name="type" value="junji-ito" /> JUNJI
              ITO</label
            >
            <label
              ><input type="checkbox" name="type" value="mha" /> MY HERO
              ACADEMIA</label
            >
          </div>
        </div>
        <div class="filter-group">
          <h3>Trạng Thái</h3>
          <div class="filter-options">
            <label><input type="radio" name="status" checked /> Tất cả</label>
            <label><input type="radio" name="status" /> Sẵn hàng</label>
            <label
              ><input type="radio" name="status" /> Đặt trước (Pre-order)</label
            >
          </div>
        </div>
      </aside>

      <!-- LƯỚI SẢN PHẨM BÊN PHẢI -->
      <section>
        <div class="section-header">
          <h2>Tất Cả Sản Phẩm</h2>
        </div>

        <!-- LƯỚI SẢN PHẨM RỖNG - JAVASCRIPT SẼ TỰ ĐỘNG SINH CODE VÀO ĐÂY -->
        <div class="products-grid" id="productGrid"></div>
      </section>
    </div>

    <footer>
      <p>
        &copy; 2026 <span>CRIMSON.GSC</span>. Assignment Thiết kế Web giới thiệu
        Mô hình.
      </p>
    </footer>

    <!-- ĐƯỜNG DẪN KẾT NỐI FILE SCRIPT JS -->
    <script src="../js/script.js"></script>
    <script>
      // =========================================================
      // HÀM LỌC SẢN PHẨM THEO TRẠNG THÁI CHECKBOX
      // =========================================================
      function filterProductsByCheckbox() {
        // 1. Gom tất cả các ô checkbox dòng mô hình đang được tích chọn
        const checkedBoxes = document.querySelectorAll(
          'input[name="type"]:checked',
        );

        // 2. Chuyển đổi danh sách checkbox thành một mảng chứa các chữ giá trị
        const selectedTypes = Array.from(checkedBoxes).map((cb) => cb.value);

        // 3. Nếu không tích chọn bất kỳ ô nào, ẩn sạch sản phẩm và báo lỗi
        if (selectedTypes.length === 0) {
          document.getElementById("productGrid").innerHTML = `
            <div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 50px 0; font-size: 14px;">
                Bạn đã bỏ chọn tất cả các dòng! Không có mô hình nào để hiển thị.
            </div>`;
          return;
        }

        // 4. Lọc mảng dữ liệu gốc `products`, giữ lại sản phẩm nào có 'type' nằm trong danh sách đã tích
        const filteredResult = products.filter((item) =>
          selectedTypes.includes(item.type),
        );

        // 5. Đổ lại danh sách đã lọc ra lưới sản phẩm
        loadAllProducts(filteredResult, true);
      }

      // =========================================================
      // ĐOẠN CODE ĐỌC TÍN HIỆU TỪ URL TRANG DANH MỤC TRUYỀN SANG
      // =========================================================
      const urlParams = new URLSearchParams(window.location.search);
      const typeFromUrl = urlParams.get("type"); // Nhận diện các chữ 'marvel', 'naruto', 'stranger-things', 'one-piece'

      if (typeFromUrl) {
        // Nếu chuyển từ trang danh mục qua -> tắt hết tất cả các ô tick
        document
          .querySelectorAll('input[name="type"]')
          .forEach((cb) => (cb.checked = false));

        // Tìm đúng ô checkbox có value trùng với trên link và tích nó lên
        const targetCheckbox = document.querySelector(
          `input[name="type"][value="${typeFromUrl}"]`,
        );
        if (targetCheckbox) {
          targetCheckbox.checked = true;
        }
      } else {
        // Nếu khách nhấn trực tiếp vào tab "Sản Phẩm" -> tự động tích tất cả để hiện đủ hàng ban đầu
        document
          .querySelectorAll('input[name="type"]')
          .forEach((cb) => (cb.checked = true));
      }

      // =========================================================
      // KÍCH HOẠT VÀ GẮN BỘ LẮNG NGHE SỰ KIỆN
      // =========================================================

      // Chạy hàm lọc dựa trên cấu hình checkbox vừa setup ở trên
      filterProductsByCheckbox();

      // Kích hoạt tính năng tìm kiếm qua ô #searchInput cho trang này
      searchProducts(true);

      // Gắn sự kiện 'change' (thay đổi) cho toàn bộ checkbox dòng mô hình
      document.querySelectorAll('input[name="type"]').forEach((checkbox) => {
        checkbox.addEventListener("change", filterProductsByCheckbox);
      });
    </script>
  </body>
</html>
