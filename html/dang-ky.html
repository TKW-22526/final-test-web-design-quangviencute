<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký Tài Khoản - SHK SHOP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dang-ky.css" />

    <style></style>
  </head>
  <body>
    <div class="auth-container">
      <h2>Đăng <span>Ký</span></h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input
            type="text"
            id="regUser"
            placeholder="Nhập tên tài khoản..."
            required
          />
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input
            type="password"
            id="regPass"
            placeholder="Nhập mật khẩu..."
            required
          />
        </div>
        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input
            type="password"
            id="regConfirmPass"
            placeholder="Nhập lại mật khẩu..."
            required
          />
        </div>
        <button type="submit" class="auth-btn">Tạo Tài Khoản</button>
      </form>
      <div class="auth-redirect">
        Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Chặn reload trang

          const user = document.getElementById("regUser").value.trim();
          const pass = document.getElementById("regPass").value;
          const confirmPass = document.getElementById("regConfirmPass").value;

          if (pass !== confirmPass) {
            alert("Mật khẩu nhập lại không trùng khớp!");
            return;
          }

          // Kiểm tra xem tên tài khoản đã tồn tại chưa
          if (localStorage.getItem("user_" + user)) {
            alert("Tên đăng nhập này đã có người sử dụng!");
            return;
          }

          // Lưu tài khoản vào localStorage
          localStorage.setItem("user_" + user, pass);
          alert(
            "Đăng ký thành công! Hệ thống sẽ chuyển bạn sang trang Đăng nhập.",
          );

          // ĐÁ CHẠY QUA TRANG ĐĂNG NHẬP THEO YÊU CẦU CỦA BẠN
          window.location.href = "dang-nhap.html";
        });
    </script>
  </body>
</html>
